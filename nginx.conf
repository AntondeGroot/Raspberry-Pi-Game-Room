server {
    listen 80;

    # Cloudflare Tunnel connects to nginx over plain HTTP, so $scheme is always
    # "http" here. Using $scheme would overwrite the "X-Forwarded-Proto: https"
    # that Cloudflare already set, causing Spring Boot to think the connection is
    # insecure and skip the Secure flag on cookies. Forwarding the incoming header
    # instead preserves the original protocol seen by the client.

    # GameRoom lobby
    location / {
        proxy_pass http://localhost:4100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Keezenspel frontend — strip /keezen prefix before forwarding
    location /keezen/ {
        proxy_pass http://localhost:4200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Qwixx — strip /qwixx prefix before forwarding
    location /qwixx/ {
        proxy_pass http://localhost:4300/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}