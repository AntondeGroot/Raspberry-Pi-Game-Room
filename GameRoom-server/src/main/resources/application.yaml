server:
  error:
    whitelabel:
      enabled: false
    path: /error

  forward-headers-strategy: framework
  port: 4100



spring:
  application:
    name: GameRoom
  config:
    import:
      - "classpath:games.yaml"
      - "optional:file:/opt/gameroom/games.yaml"
      - "classpath:sprite-sheets.yaml"
      - "optional:file:/opt/gameroom/sprite-sheets.yaml"
      - "optional:file:/opt/gameroom/secrets.yaml"

  devtools:
    restart:
      additional-exclude: launcherDir/**
    add-properties: false

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ
    serialization:
      write_dates_as_timestamps: false

  output:
    ansi:
      enabled: detect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  web:
    resources:
      static-locations: classpath:/launcherDir/,classpath:/public/

admin:
  # Default password is "test" — fine for local dev, override on the Pi.
  # Generate a new hash: java -jar GameRoom.jar --generate-password=yourPassword
  # Then put the result in /opt/gameroom/secrets.yaml as: admin.password-hash: "$2a$10$..."
  password-hash: "$2a$10$zW.25eyinz1Tqyw6cxyIyOF4UcjnVtHlKPPt2DIEAIFC52.tkn5J2"

debug: false

logging:
  level:
    root: info
    web: info
    ADG: debug

  pattern:
    file: '%d{yyyy-MMM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{15} - %msg%n'
    console: '%d{yyyy-MMM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{15} - %msg%n'